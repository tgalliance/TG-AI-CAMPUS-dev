<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - TG에듀테크</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/enhanced-styles.css">
    <link rel="stylesheet" href="assets/css/samsung-nav.css?v=3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0099FF 0%, #0077CC 100%);
            padding: 2rem 1rem;
        }

        .login-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 3rem;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #0099FF, #0077CC);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 153, 255, 0.3);
        }

        .login-header .logo-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Noto Sans KR', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(0, 153, 255, 0.1);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0099FF, #0077CC);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 153, 255, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 153, 255, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-btn {
            flex: 1;
            padding: 0.9rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            background: var(--bg-light);
            transform: translateY(-2px);
        }

        .social-btn.google {
            color: #DB4437;
        }

        .social-btn.kakao {
            color: #FEE500;
            background: #3C1E1E;
        }

        .social-btn.kakao:hover {
            background: #2C1414;
        }

        .social-btn.naver {
            color: white;
            background: #03C75A;
            border-color: #03C75A;
        }

        .social-btn.naver:hover {
            background: #02B351;
        }

        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .login-box {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <!-- Top Utility Bar -->
        <div class="utility-bar">
            <div class="container">
                <div class="utility-wrapper">
                    <a href="support.html" class="utility-link">고객지원</a>
                    <a href="notices.html" class="utility-link">공지사항</a>
                    <a href="inquiry.html" class="utility-link">교육문의</a>
                    <a href="https://tgnco.kr/tg-alliance/" target="_blank" class="external-link tg-alliance">
                        TG Alliance <i class="fas fa-external-link-alt"></i>
                    </a>
                    <a href="https://www.softmind.co.kr" target="_blank" class="external-link">
                        소프트마인 <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Navigation Bar -->
        <nav class="navbar">
            <div class="container">
                <div class="nav-wrapper">
                    <!-- Left Side: Logo + Menu -->
                    <div class="nav-left">
                        <a href="index.html" class="logo">
                            <i class="fas fa-brain"></i>
                            <span><span class="logo-tg">TG</span>에듀테크</span>
                        </a>
                        
                                                <ul class="nav-menu">
                            <li><a href="about.html">TG AI 캠퍼스소개</a></li>
                            <li><a href="manuals.html">AI 활용메뉴얼</a></li>
                            <li><a href="dictionary.html">AI 용어사전</a></li>
                            <li><a href="recommended.html">AI 활용추천영상</a></li>
                            <li><a href="curriculum.html">교육과정</a></li>
                            <li><a href="support.html" style="color: #3b82f6; font-weight: 600;">나만의 AI 코치</a></li>
                            <li><a href="dashboard.html">학습 현황</a></li>
                        </ul>
                    </div>
                    
                    <!-- Right Side: Search + Icons -->
                    <div class="nav-right">
                        <!-- Search -->
                        <div class="search-wrapper">
                            <form class="search-form">
                                <button type="submit" class="search-btn">
                                    <i class="fas fa-search"></i>
                                </button>
                                <input type="text" class="search-input" placeholder="검색" autocomplete="off">
                            </form>
                        </div>
                        
                        <!-- Icon Actions --><div class="icon-actions">
                            <a href="mypage.html" class="icon-link" title="마이페이지">
                                <img src="assets/images/mypage-icon-new.png?v=2" alt="마이페이지" class="icon-img mypage-icon" style="width: auto !important; height: 20px !important; max-height: 20px !important;">
                            </a>
                            <a href="login.html" class="icon-link" id="authIcon" title="로그인">
                                <img src="assets/images/logout-icon.png" alt="로그인" class="icon-img" style="width: 24px !important; height: 24px !important; max-width: 24px !important; max-height: 24px !important;">
                            </a>
                        </div>
                        
                        <!-- Mobile Toggle -->
                        <button class="mobile-menu-toggle" id="mobileMenuToggle">
                            <i class="fas fa-bars"></i>
                        </button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Login Container -->
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>로그인</h1>
                <p>TG에듀테크 플랫폼에 오신 것을 환영합니다</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="이메일을 입력하세요" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                    </div>
                </div>

                <div class="form-options">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember">
                        <label for="remember">로그인 상태 유지</label>
                    </div>
                    <a href="#" class="forgot-password">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
            </form>

            <div class="divider">
                <span>또는</span>
            </div>

            <div class="social-login">
                <button class="social-btn google" onclick="socialLogin('google')">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn kakao" onclick="socialLogin('kakao')">
                    <i class="fas fa-comment"></i>
                </button>
                <button class="social-btn naver" onclick="socialLogin('naver')">
                    <strong>N</strong>
                </button>
            </div>

            <div class="signup-link">
                아직 계정이 없으신가요? <a href="#">회원가입</a>
            </div>
        </div>
    </div>

    <script>
        // 테스트용 계정 정보
        const TEST_ACCOUNTS = {
            'admin@tgai.com': '1234',
            'user@tgai.com': 'test1234',
            'student@tgai.com': 'student123',
            '1234@': '1234'
        };

        const ACCOUNT_NAMES = {
            'admin@tgai.com': '관리자',
            'user@tgai.com': '사용자',
            'student@tgai.com': '학생',
            '1234@': '김티지'
        };

        // 페이지 로드 시 테스트 계정 안내
        window.addEventListener('DOMContentLoaded', function() {
            const testInfo = document.createElement('div');
            testInfo.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: white;
                padding: 1.5rem;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                max-width: 300px;
                z-index: 9999;
                animation: slideInRight 0.5s ease;
            `;
            testInfo.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <strong style="color: #0099FF;">
                        <i class="fas fa-info-circle"></i> 테스트 계정
                    </strong>
                    <button onclick="this.parentElement.parentElement.remove()" style="border: none; background: none; cursor: pointer; font-size: 1.2rem; color: #999;">×</button>
                </div>
                <div style="font-size: 0.85rem; color: #666; line-height: 1.6;">
                    <div>
                        <strong>김티지:</strong><br>
                        이메일: 1234@ / 비번: 1234
                    </div>
                </div>
            `;
            document.body.appendChild(testInfo);

            // 5초 후 자동으로 숨기기
            setTimeout(() => {
                testInfo.style.opacity = '0';
                testInfo.style.transition = 'opacity 0.5s ease';
                setTimeout(() => testInfo.remove(), 500);
            }, 10000);
        });

        // 로그인 폼 제출
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            // 테스트 계정 확인
            if (TEST_ACCOUNTS[email] && TEST_ACCOUNTS[email] === password) {
                const name = ACCOUNT_NAMES[email] || email.split('@')[0];
                const userData = {
                    email: email,
                    loginTime: new Date().toISOString(),
                    remember: remember,
                    name: name
                };

                localStorage.setItem('ai_learning_user', JSON.stringify(userData));
                localStorage.setItem('ai_learning_logged_in', 'true');

                alert('✅ 로그인 성공!\n\n' + name + '님, 환영합니다!');
                
                // 대시보드로 이동
                window.location.href = 'dashboard.html';
            } else {
                alert('❌ 로그인 실패\n\n이메일 또는 비밀번호가 올바르지 않습니다.\n\n테스트 계정:\n• 이메일: 1234@ / 비번: 1234');
            }
        });

        // 소셜 로그인
        function socialLogin(platform) {
            alert(platform.toUpperCase() + ' 로그인은 프로토타입에서 지원하지 않습니다.\n\n실제 서비스에서는 OAuth 인증을 통해 로그인할 수 있습니다.');
        }

        // 모바일 메뉴 토글
        document.getElementById('mobileMenuToggle')?.addEventListener('click', function() {
            document.querySelector('.nav-menu').classList.toggle('active');
        });

        // 이미 로그인된 경우
        if (localStorage.getItem('ai_learning_logged_in') === 'true') {
            const userData = JSON.parse(localStorage.getItem('ai_learning_user') || '{}');
            if (confirm(userData.email + '님으로 이미 로그인되어 있습니다.\n\n메인 페이지로 이동하시겠습니까?')) {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
